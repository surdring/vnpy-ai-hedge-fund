services:
  vnpy-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.core
    environment:
      AI_AGENT_ENABLED: "false"
      AI_AGENT_AUTO_TRADE: "false"
  vnpy-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    environment:
      AI_AGENT_MODEL_PROVIDER: Ollama
      AI_AGENT_MODEL_NAME: llama3
  vnpy-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "8000:8000"

